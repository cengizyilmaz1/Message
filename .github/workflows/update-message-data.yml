# Refresh Message Center and Microsoft 365 Roadmap data

name: update-message-data

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '@data/**'
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron:  '0 * * * *'
    
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Get Message Center and Roadmap data
        run: |
          ./@build/Update-MessageCenter.ps1 -GraphSecret ${{ secrets.GRAPH_SECRET }}
        shell: pwsh
        env:
          M365_TENANT_ID: ${{ secrets.TENANT_ID }}
          M365_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        
      - name: Update repo
        run: |
          if [[ `git status --porcelain` ]]; then
            echo "Updating repo"
            git config --global user.name 'Cengiz Yilmaz'
            git config --global user.email '62932614+cengizyilmaz1@users.noreply.github.com'
            git add -A && git commit -m "Update Microsoft 365 message archive data"
            git push
          else
            echo "No changes"
          fi
